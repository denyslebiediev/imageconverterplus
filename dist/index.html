<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter Plus</title>
    <noscript><meta http-equiv="refresh" content="0;url=en/index.html"></noscript>
    <script>
    (function() {
        var supported = ["en","uk","zh-Hans","ja","es","pt-BR","ko","de","fr","hi","id","tr","vi","ar","it","zh-Hant","nl","sv","nb","da","fi","he","pl","th","pt-PT","el","cs","hu","ro","sk","hr","ms","ca","bn","ur","fil","pa","ta","te","fa","mr","gu","kn","ml","af","bg","sr","sl","mt","ga","sq","bs","mk","is","et","lv","lt","sw","cy","be"];
        var set = {};
        for (var i = 0; i < supported.length; i++) set[supported[i]] = true;

        var aliases = {
            'zh-CN': 'zh-Hans', 'zh-TW': 'zh-Hant',
            'pt': 'pt-BR', 'no': 'nb', 'tl': 'fil'
        };

        var prefix = "";
        var target = "index.html";
        var langs = navigator.languages || [navigator.language || 'en'];
        for (var i = 0; i < langs.length; i++) {
            var tag = langs[i];
            if (aliases[tag]) tag = aliases[tag];
            if (set[tag]) { location.replace(prefix + tag + '/' + target); return; }
            var base = tag.split('-')[0];
            if (aliases[base]) base = aliases[base];
            if (set[base]) { location.replace(prefix + base + '/' + target); return; }
        }
        location.replace(prefix + 'en/' + target);
    })();
    </script>
</head>
<body></body>
</html>
